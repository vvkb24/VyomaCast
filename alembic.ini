# =============================================================
# VyomaCast — Alembic Configuration
# =============================================================
# The sqlalchemy.url is overridden programmatically in env.py
# using the application's Settings object.  Do NOT set it here.
# =============================================================

[alembic]
script_location = alembic
prepend_sys_path = .

# Template used for new migration files
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Truncate long revision IDs in filenames
truncate_slug_length = 40

# Set timezone for migration timestamps
timezone = UTC

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
